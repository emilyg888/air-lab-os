# air-lab-os scoring policy
# Locked — human-owned. Do not modify.
# Weights must sum to 1.0.
# This is the DEFAULT policy. Use-case plugins may provide their own.

version: "1.1"

weights:
  primary_metric: 0.40
  explainability: 0.25
  latency: 0.20
  cost: 0.15

promotion:
  working_threshold: 0.65
  stable_threshold: 0.78
  min_runs: 3

latency:
  max_ms: 500

cost:
  max_per_1k: 0.10

rules:
  primary_metric_floor: 0.1
  stability_threshold: 0.05
  penalty_factor: 0.5
  stability_gap_threshold: 0.2
  promotion_confidence_threshold: 0.7

arena:
  ranking:
    stable_bonus: 1.1
    unstable_bonus: 0.9
  exploration:
    max_runs_per_pattern: 5
